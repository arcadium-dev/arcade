name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0

    - name: Install Go
      uses: actions/setup-go@v2
      with:
        stable: false
        go-version: 1.18.0-rc1

    - name: Lint
      run: |
        make lint

    - name: Test
      run: |
        make test
