name: Integration Tests

on: pull_request

jobs:
  integration_tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
    - name: Install Go
      uses: actions/setup-go@v2
      with:
        stable: false
        go-version: '1.18'

    - name: Checkout code
      uses: actions/checkout@v2
      with:
        fetch-depth: 0

    - name: Integration Tests
      run: |
        make integration_test
